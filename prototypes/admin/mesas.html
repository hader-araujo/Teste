        <button class="btn btn-primary" onclick="openModal('modal-nova-mesa')">+ Nova Mesa</button>

      <!-- Page Body -->
      <div class="admin-page-body">

        <!-- Legenda de cores -->

          <div style="display:flex; align-items:center; gap:0.5rem;">

          <div style="display:flex; align-items:center; gap:0.5rem;">
            <span style="width:14px; height:14px; border-radius:3px; background:var(--color-info);"></span>
            <span style="font-size:0.8125rem; color:var(--color-text-secondary);">Ocupada</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.5rem;">
            <span style="width:14px; height:14px; border-radius:3px; background:var(--color-warning);"></span>
            <span style="font-size:0.8125rem; color:var(--color-text-secondary);">Pedindo conta</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.5rem;">
            <span style="width:14px; height:14px; border-radius:3px; background:var(--color-error);"></span>

        <!-- Grid de Mesas -->

          <!-- JS vai popular -->

  </div>

  <!-- Modal Nova Mesa -->
  <div class="modal-overlay" id="modal-nova-mesa">
    <div class="modal">
      <div class="modal-header">
        <h3>Nova Mesa</h3>
        <button class="btn-ghost" onclick="closeModal('modal-nova-mesa')" aria-label="Fechar" style="padding:0.25rem;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label for="mesa-number">Número da mesa</label>
          <input class="input" id="mesa-number" type="number" min="1" placeholder="Ex.: 16">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-nova-mesa')">Cancelar</button>
        <button class="btn btn-primary" onclick="addNewMesa()">Criar Mesa</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    function createMesaCard(table) {
      var statusLabel = getTableStatusLabel(table.status);
      var badgeClasses = {
        livre: 'badge-success',
        ocupada: 'badge-info',
        conta: 'badge-warning',
        atrasada: 'badge-error'
      };
      var badgeClass = badgeClasses[table.status] || 'badge-gray';

      var card = document.createElement('div');
      card.className = 'mesa-card ' + table.status;

      // Header row: number + status badge
      var header = document.createElement('div');
      header.style.cssText = 'display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:0.75rem;';

      var numberEl = document.createElement('div');
      numberEl.className = 'mesa-number';
      numberEl.textContent = table.number;
      header.appendChild(numberEl);

      var badge = document.createElement('span');
      badge.className = 'badge ' + badgeClass;
      badge.textContent = statusLabel;
      header.appendChild(badge);

      card.appendChild(header);

      if (table.status !== 'livre') {
        var details = document.createElement('div');
        details.style.cssText = 'display:flex; flex-direction:column; gap:0.375rem; font-size:0.8125rem; color:var(--color-text-secondary);';

        // Time
        var timeRow = document.createElement('div');
        timeRow.style.cssText = 'display:flex; align-items:center; gap:0.375rem;';
        var timeIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        timeIcon.setAttribute('viewBox', '0 0 24 24');
        timeIcon.setAttribute('width', '14');
        timeIcon.setAttribute('height', '14');
        timeIcon.setAttribute('fill', 'none');
        timeIcon.setAttribute('stroke', 'currentColor');
        timeIcon.setAttribute('stroke-width', '2');
        var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', '12'); circle.setAttribute('cy', '12'); circle.setAttribute('r', '10');
        var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        polyline.setAttribute('points', '12,6 12,12 16,14');
        timeIcon.appendChild(circle);
        timeIcon.appendChild(polyline);
        timeRow.appendChild(timeIcon);
        var timeText = document.createElement('span');
        timeText.textContent = table.time;
        timeRow.appendChild(timeText);
        details.appendChild(timeRow);

        // Value
        var valRow = document.createElement('div');
        valRow.style.cssText = 'display:flex; align-items:center; gap:0.375rem;';
        var valIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        valIcon.setAttribute('viewBox', '0 0 24 24');
        valIcon.setAttribute('width', '14');
        valIcon.setAttribute('height', '14');
        valIcon.setAttribute('fill', 'none');
        valIcon.setAttribute('stroke', 'currentColor');
        valIcon.setAttribute('stroke-width', '2');
        var line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line1.setAttribute('x1','12'); line1.setAttribute('y1','1'); line1.setAttribute('x2','12'); line1.setAttribute('y2','23');
        var path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path1.setAttribute('d', 'M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6');
        valIcon.appendChild(line1);
        valIcon.appendChild(path1);
        valRow.appendChild(valIcon);
        var valText = document.createElement('span');
        valText.style.cssText = 'font-weight:600; color:var(--color-text-primary);';
        valText.textContent = formatCurrency(table.value);
        valRow.appendChild(valText);
        details.appendChild(valRow);

        // People
        var pplRow = document.createElement('div');
        pplRow.style.cssText = 'display:flex; align-items:center; gap:0.375rem;';
        var pplIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        pplIcon.setAttribute('viewBox', '0 0 24 24');
        pplIcon.setAttribute('width', '14');
        pplIcon.setAttribute('height', '14');
        pplIcon.setAttribute('fill', 'none');
        pplIcon.setAttribute('stroke', 'currentColor');
        pplIcon.setAttribute('stroke-width', '2');
        var pplPath1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pplPath1.setAttribute('d', 'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2');
        var pplCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        pplCircle.setAttribute('cx','9'); pplCircle.setAttribute('cy','7'); pplCircle.setAttribute('r','4');
        pplIcon.appendChild(pplPath1);
        pplIcon.appendChild(pplCircle);
        pplRow.appendChild(pplIcon);
        var pplText = document.createElement('span');
        pplText.textContent = table.people + (table.people === 1 ? ' pessoa' : ' pessoas');
        pplRow.appendChild(pplText);
        details.appendChild(pplRow);

        card.appendChild(details);
      } else {
        var emptyText = document.createElement('div');
        emptyText.style.cssText = 'font-size:0.8125rem; color:var(--color-text-muted);';
        emptyText.textContent = 'Disponível';
        card.appendChild(emptyText);
      }

      // Action button
      var btnWrap = document.createElement('div');
      btnWrap.style.cssText = 'margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--color-border-light);';

      var btn = document.createElement('button');
      if (table.status === 'livre') {
        btn.className = 'btn btn-sm btn-success';
        btn.textContent = 'Abrir Sessão';
        btn.onclick = (function(num) {
          return function(e) {
            e.stopPropagation();
            showToast('Sessão aberta na Mesa ' + num, 'success');
          };
        })(table.number);
      } else {
        btn.className = 'btn btn-sm btn-secondary';
        btn.textContent = 'Fechar Sessão';
        btn.onclick = (function(num) {
          return function(e) {
            e.stopPropagation();
            showToast('Sessão fechada na Mesa ' + num, 'info');
          };
        })(table.number);
      }
      btn.style.cssText = 'width:100%;';
      btnWrap.appendChild(btn);
      card.appendChild(btnWrap);

      return card;
    }

    function renderMesas() {
      var grid = document.getElementById('mesas-grid');
      if (!grid) return;
      grid.textContent = '';

      MOCK.tables.forEach(function(table) {
        grid.appendChild(createMesaCard(table));
      });
    }

    function addNewMesa() {
      var input = document.getElementById('mesa-number');
      var num = parseInt(input.value);
      if (!num || num < 1) {
        showToast('Informe um número válido para a mesa.', 'warning');
        return;
      }
      var exists = MOCK.tables.find(function(t) { return t.number === num; });
      if (exists) {
        showToast('Já existe uma mesa com este número.', 'error');
        return;
      }
      MOCK.tables.push({ id: MOCK.tables.length + 1, number: num, status: 'livre', time: null, value: 0, people: 0, waiter: null });
      MOCK.tables.sort(function(a, b) { return a.number - b.number; });
      renderMesas();
      closeModal('modal-nova-mesa');
      input.value = '';
      showToast('Mesa ' + num + ' criada com sucesso!', 'success');
    }

    document.addEventListener('DOMContentLoaded', renderMesas);
  </script>
