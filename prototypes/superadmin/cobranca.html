<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobrança — Super Admin OChefia</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="superadmin-sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">OC</div>
        <span class="logo-text">OChefia</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-group">
          <div class="sidebar-group-label">Principal</div>
          <a href="dashboard.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
            Dashboard
          </a>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-group-label">Gestão</div>
          <a href="estabelecimentos.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 22V4a2 2 0 012-2h8a2 2 0 012 2v18z"/><path d="M6 12H4a2 2 0 00-2 2v6a2 2 0 002 2h2"/><path d="M18 9h2a2 2 0 012 2v9a2 2 0 01-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
            Estabelecimentos
          </a>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-group-label">Sistema</div>
          <a href="modulos.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Módulos
          </a>
          <a href="monitoramento.html" class="sidebar-item">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
            Monitoramento
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Admin OChefia</div>
          <div class="sidebar-user-role">Super Admin</div>
        </div>
        <a href="login.html" style="color:#A5B4FC" aria-label="Sair">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-content">
      <!-- Page Header -->
      <div class="page-header">
        <div>
          <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menu">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div class="breadcrumb">Super Admin</div>
          <h1>Gestão de Cobrança</h1>
        </div>
      </div>

      <!-- Page Body -->
      <div class="admin-page-body">

        <!-- KPI Grid -->
        <div class="kpi-grid mb-6">
          <div class="kpi-card kpi-indigo">
            <div class="kpi-label">Faturado este mês</div>
            <div class="kpi-value">R$ 3.398,50</div>
          </div>
          <div class="kpi-card" style="border-top:4px solid var(--color-success)">
            <div class="kpi-label">Pagos</div>
            <div class="kpi-value">3</div>
          </div>
          <div class="kpi-card" style="border-top:4px solid var(--color-warning)">
            <div class="kpi-label">Pendentes</div>
            <div class="kpi-value">3</div>
          </div>
          <div class="kpi-card kpi-alert">
            <div class="kpi-label">Atrasados</div>
            <div class="kpi-value">4</div>
          </div>
        </div>

        <!-- Filter Bar -->
        <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.5rem">
          <select class="select" id="paymentStatusFilter" onchange="filterPayments()" style="max-width:200px" aria-label="Filtrar por status do pagamento">
            <option value="">Todos os status</option>
            <option value="paid">Pagos</option>
            <option value="pending">Pendentes</option>
            <option value="overdue">Atrasados</option>
          </select>
        </div>

        <!-- Payments Table -->
        <div class="card">
          <div class="card-body-lg">
            <div class="table-container">
              <table class="table-indigo">
                <thead>
                  <tr>
                    <th>Estabelecimento</th>
                    <th>Mês/Ano</th>
                    <th style="text-align:right">Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="paymentsBody">
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script src="../js/app.js"></script>
  <script>
    function filterPayments() {
      var statusFilter = document.getElementById('paymentStatusFilter').value;
      var filtered = MOCK.superadmin.payments;
      if (statusFilter) {
        filtered = filtered.filter(function(p) { return p.status === statusFilter; });
      }
      renderPayments(filtered);
    }

    function renderPayments(list) {
      var tbody = document.getElementById('paymentsBody');
      if (list.length === 0) {
        tbody.textContent = '';
        var tr = document.createElement('tr');
        var td = document.createElement('td');
        td.colSpan = 5;
        td.style.textAlign = 'center';
        td.style.padding = '2rem';
        td.style.color = 'var(--color-text-secondary)';
        td.textContent = 'Nenhum pagamento encontrado';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }
      var sorted = list.slice().sort(function(a, b) { return (b.year - a.year) || (b.month - a.month); });
      tbody.textContent = '';
      sorted.forEach(function(p) {
        var est = MOCK.superadmin.establishments.find(function(e) { return e.id === p.establishmentId; });
        var name = est ? sanitizeText(est.name) : 'Desconhecido';

        var tr = document.createElement('tr');

        var tdName = document.createElement('td');
        tdName.style.fontWeight = '600';
        tdName.textContent = name;
        tr.appendChild(tdName);

        var tdMonth = document.createElement('td');
        tdMonth.textContent = getMonthLabel(p.month) + '/' + p.year;
        tr.appendChild(tdMonth);

        var tdValue = document.createElement('td');
        tdValue.style.fontWeight = '600';
        tdValue.style.textAlign = 'right';
        tdValue.textContent = 'R$ ' + p.amount.toFixed(2).replace('.', ',');
        tr.appendChild(tdValue);

        var tdStatus = document.createElement('td');
        var badge = document.createElement('span');
        badge.className = 'badge ' + getPaymentStatusBadge(p.status);
        badge.textContent = getPaymentStatusLabel(p.status);
        tdStatus.appendChild(badge);
        tr.appendChild(tdStatus);

        var tdActions = document.createElement('td');
        if (p.status !== 'paid') {
          var btn = document.createElement('button');
          btn.className = 'btn btn-sm btn-success';
          btn.textContent = 'Marcar Pago';
          btn.addEventListener('click', function() {
            showToast('Pagamento marcado como pago!', 'success');
          });
          tdActions.appendChild(btn);
        } else {
          var span = document.createElement('span');
          span.style.fontSize = '0.8125rem';
          span.style.color = 'var(--color-text-muted)';
          span.textContent = '\u2014';
          tdActions.appendChild(span);
        }
        tr.appendChild(tdActions);

        tbody.appendChild(tr);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderPayments(MOCK.superadmin.payments);
    });
  </script>
</body>
</html>
