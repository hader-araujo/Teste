<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamados — OChefia Garçom</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="waiter-layout">

    <!-- Header -->
    <header class="waiter-header">
      <h1>Chamados</h1>
      <div class="waiter-badge" aria-label="3 chamados pendentes">3</div>
    </header>

    <!-- Call List -->
    <main style="padding:1rem; display:flex; flex-direction:column; gap:0.75rem;">

      <!-- Chamado — Mesa 5 — Chamar garçom -->
      <article class="card" style="border-left:4px solid var(--color-warning);">
        <div class="card-body">
          <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-2">
              <span style="font-size:1.125rem; font-weight:700; color:var(--color-text-primary);">Mesa 5</span>
              <span class="badge badge-warning">Chamar garçom</span>
            </div>
            <span style="font-size:0.75rem; color:var(--color-text-muted); font-weight:600;">5min</span>
          </div>
          <div class="flex gap-2" style="margin-top:0.75rem;">
            <button class="btn btn-secondary btn-sm" onclick="showToast('Chamado da Mesa 5 visualizado', 'info')">Vi</button>
            <button class="btn btn-success btn-sm" onclick="this.closest('article').style.opacity='0.4'; showToast('Chamado da Mesa 5 resolvido', 'success')">Resolvido</button>
          </div>
        </div>
      </article>

      <!-- Chamado — Mesa 8 — Pedir conta -->
      <article class="card" style="border-left:4px solid var(--color-error);">
        <div class="card-body">
          <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-2">
              <span style="font-size:1.125rem; font-weight:700; color:var(--color-text-primary);">Mesa 8</span>
              <span class="badge badge-error">Pedir conta</span>
            </div>
            <span style="font-size:0.75rem; color:var(--color-text-muted); font-weight:600;">12min</span>
          </div>
          <p style="font-size:0.875rem; color:var(--color-text-secondary); margin-top:0.5rem; font-style:italic;">
            "Gostaríamos de fechar a conta, por favor."
          </p>
          <div class="flex gap-2" style="margin-top:0.75rem;">
            <button class="btn btn-secondary btn-sm" onclick="showToast('Chamado da Mesa 8 visualizado', 'info')">Vi</button>
            <button class="btn btn-success btn-sm" onclick="this.closest('article').style.opacity='0.4'; showToast('Chamado da Mesa 8 resolvido', 'success')">Resolvido</button>
          </div>
        </div>
      </article>

      <!-- Chamado — Mesa 3 — Outro (already acknowledged) -->
      <article class="card" style="border-left:4px solid var(--color-info); opacity:0.7;">
        <div class="card-body">
          <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-2">
              <span style="font-size:1.125rem; font-weight:700; color:var(--color-text-primary);">Mesa 3</span>
              <span class="badge badge-info">Outro</span>
              <span class="badge badge-gray">Visto</span>
            </div>
            <span style="font-size:0.75rem; color:var(--color-text-muted); font-weight:600;">2min</span>
          </div>
          <p style="font-size:0.875rem; color:var(--color-text-secondary); margin-top:0.5rem; font-style:italic;">
            "Falta um talher na mesa."
          </p>
          <div class="flex gap-2" style="margin-top:0.75rem;">
            <button class="btn btn-success btn-sm" onclick="this.closest('article').style.opacity='0.3'; showToast('Chamado da Mesa 3 resolvido', 'success')">Resolvido</button>
          </div>
        </div>
      </article>

    </main>

    <!-- Bottom Tabs -->
    <nav class="waiter-tabs" aria-label="Navegação">
      <a href="mesas.html">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Mesas
      </a>
      <a href="chamados.html" class="active">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        Chamados
      </a>
      <a href="mesa-detalhe.html">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Detalhes
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Perfil
      </a>
    </nav>

  </div>

  <script src="../js/app.js"></script>
</body>
</html>
