<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação WhatsApp — Zé do Bar</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="client-page" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="font-size:2rem; font-weight:700; color:var(--color-primary);">Zé do Bar</h1>
      <p style="color:var(--color-gray-500); margin-top:8px; font-size:0.95rem;">Verificação WhatsApp</p>
    </div>

    <!-- Phone Input Section -->
    <div id="phone-section" style="width:100%; max-width:360px;">
      <div class="input-group mb-4">
        <label for="phone-input">Número de celular</label>
        <input class="input" id="phone-input" type="tel" placeholder="(11) 99999-9999" value="(11) 99999-9999" maxlength="15" oninput="maskPhone(this)">
      </div>
      <button class="btn btn-primary btn-full" onclick="sendCode()" id="send-btn">
        Enviar código via WhatsApp
      </button>
    </div>

    <!-- OTP Section (hidden initially) -->
    <div id="otp-section" style="width:100%; max-width:360px; display:none; text-align:center;">
      <p style="color:var(--color-gray-700); margin-bottom:16px; font-size:0.95rem;">
        Digite o código enviado para o seu WhatsApp
      </p>
      <div style="display:flex; gap:8px; justify-content:center; margin-bottom:24px;" id="otp-inputs">
        <input class="input" type="text" maxlength="1" inputmode="numeric" style="width:48px; height:56px; text-align:center; font-size:1.5rem; font-weight:700; padding:0;" value="1" oninput="otpNext(this, 0)">
        <input class="input" type="text" maxlength="1" inputmode="numeric" style="width:48px; height:56px; text-align:center; font-size:1.5rem; font-weight:700; padding:0;" value="2" oninput="otpNext(this, 1)">
        <input class="input" type="text" maxlength="1" inputmode="numeric" style="width:48px; height:56px; text-align:center; font-size:1.5rem; font-weight:700; padding:0;" value="3" oninput="otpNext(this, 2)">
        <input class="input" type="text" maxlength="1" inputmode="numeric" style="width:48px; height:56px; text-align:center; font-size:1.5rem; font-weight:700; padding:0;" value="4" oninput="otpNext(this, 3)">
        <input class="input" type="text" maxlength="1" inputmode="numeric" style="width:48px; height:56px; text-align:center; font-size:1.5rem; font-weight:700; padding:0;" value="5" oninput="otpNext(this, 4)">
        <input class="input" type="text" maxlength="1" inputmode="numeric" style="width:48px; height:56px; text-align:center; font-size:1.5rem; font-weight:700; padding:0;" value="6" oninput="otpNext(this, 5)">
      </div>
      <button class="btn btn-primary btn-full" onclick="verifyCode()">Verificar</button>
      <p style="margin-top:16px; font-size:0.85rem; color:var(--color-gray-500);">
        Não recebeu? <a href="#" onclick="resendCode(); return false;" style="color:var(--color-primary); font-weight:500;">Reenviar código</a>
      </p>
    </div>

  </div>

  <script src="../js/app.js"></script>
  <script>
    function maskPhone(input) {
      let v = input.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 7) {
        v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
      } else if (v.length > 2) {
        v = '(' + v.slice(0,2) + ') ' + v.slice(2);
      } else if (v.length > 0) {
        v = '(' + v;
      }
      input.value = v;
    }

    function sendCode() {
      const phone = document.getElementById('phone-input').value.replace(/\D/g, '');
      if (phone.length < 10) {
        showToast('Digite um número de celular válido', 'error');
        return;
      }
      document.getElementById('phone-section').style.display = 'none';
      document.getElementById('otp-section').style.display = 'block';
      showToast('Código enviado via WhatsApp!', 'success');
      // Focus first OTP input
      document.querySelector('#otp-inputs input').focus();
    }

    function otpNext(input, index) {
      input.value = input.value.replace(/\D/g, '');
      if (input.value && index < 5) {
        const inputs = document.querySelectorAll('#otp-inputs input');
        inputs[index + 1].focus();
      }
    }

    function verifyCode() {
      const inputs = document.querySelectorAll('#otp-inputs input');
      let code = '';
      inputs.forEach(i => code += i.value);
      if (code.length < 6) {
        showToast('Digite o código completo de 6 dígitos', 'error');
        return;
      }
      showToast('Verificação concluída!', 'success');
      setTimeout(() => {
        window.location.href = 'pessoas.html';
      }, 800);
    }

    function resendCode() {
      showToast('Novo código enviado!', 'success');
    }
  </script>
</body>
</html>
